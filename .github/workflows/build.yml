name: Build Shaders
on: 
    push:
    pull_request:
    workflow_dispatch:


jobs:
    build:
        name: Build Shaders
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Dependencies
              uses: crazy-max/ghaction-chocolatey@v3
              with:
                args: install vcredist140 directx -y

            - name: Build Shaders
              run: |
                ./buildshaders.bat
                mkdir artifact > $null
                mv update artifact/update/

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: fusion_shaders
                path: artifact/